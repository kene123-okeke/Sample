    <body class="body">
       <div class="main_block">
        <form class="fill-in" action="dashboard.html">
             <h2 class="head">Sign Up</h2>
            <p  class ="name">Lastname</p>

            <p  class ="name">Firstname</p>
            <input class="input"type="text", name=" Firstname", placeholder="Firstname">
            <p class="name">Enter Your Email</p>

        </form>
       </div>
